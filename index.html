<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlameMu - Trang Chủ</title>
    <style>
        /* Reset cơ bản */
        body { 
            margin: 0; padding: 0; font-family: Arial, sans-serif; 
            background: #000 url('flame.png') no-repeat center center fixed; 
            background-size: cover; color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
        }

        /* --- PHẦN TIÊU ĐỀ --- */
        .header-text { text-align: center; z-index: 5; margin-bottom: 40px; }
        
        .title-main { 
            color: red; font-size: 5.25vw; font-weight: bold; 
            -webkit-text-stroke: 1.5px #fff; text-stroke: 1.5px #fff; 
        }
        .title-sub { 
            color: #ff00ff; font-size: 2.5vw; font-weight: bold; margin-top: 10px;
            text-decoration: underline; text-underline-offset: 8px;
            -webkit-text-stroke: 0.5px #fff; text-stroke: 0.5px #fff;
        }
        .title-desc { 
            color: blue; font-size: 3vw; font-weight: bold; margin-top: 15px;
            -webkit-text-stroke: 1.5px #fff; text-stroke: 1.5px #fff;
        }

        /* Menu góc phải trên */
        .top-right-nav { 
            position: absolute; top: 20px; right: 20px; 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 10; 
        }
        
        /* Cấu hình nút bấm - Định nghĩa màu sắc cố định */
        .nav-link, .main-btn { 
            color: #fff !important; 
            text-decoration: none !important; 
            border: 1px solid #d4af37; 
            border-radius: 4px; 
            background: rgba(0,0,0,0.7) !important; 
            text-align: center; 
            display: inline-block;
            transition: all 0.3s ease !important;
        }
        
        .nav-link { padding: 8px 12px; font-size: 14px; }
        
        /* Menu 3 nút giữa */
        .center-menu { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        .main-btn { padding: 12px 25px; width: 220px; font-size: 16px; }

        /* Hiệu ứng khi di chuột vào (Hover) */
        .nav-link:hover, .main-btn:hover { 
            background: #d4af37 !important; 
            color: #000 !important; 
            font-weight: bold; 
            cursor: pointer;
        }

        /* Trạng thái sau khi click - Ép giữ nguyên style */
        .nav-link:visited, .nav-link:active, .nav-link:focus,
        .main-btn:visited, .main-btn:active, .main-btn:focus {
            color: #fff !important;
            background: rgba(0,0,0,0.7) !important;
        }

        /* --- TỐI ƯU MOBILE --- */
        @media (max-width: 768px) {
            .title-main { font-size: 10vw; }
            .title-sub { font-size: 5vw; }
            .title-desc { font-size: 7vw; }
            .top-right-nav { top: 10px; left: 10px; right: 10px; }
            .nav-link { font-size: 10px; padding: 4px; }
            .main-btn { width: 80%; padding: 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="header-text">
        <div class="title-main">Flame - MuOnline</div>
        <div class="title-sub">Season2 - Reset</div>
        <div class="title-desc">Lâu Dài - Cày Cuốc</div>
    </div>

    <div class="top-right-nav">
        <a href="https://drive.google.com/file/d/10TdXh1X7k9XyNB99wb3Z9QVw5GOf9QM9/view?usp=drive_link" class="nav-link">Tải Google</a>
        <a href="https://mega.nz/file/SiIBDJSR#Y-kVmc9Brr62-6tx1yFAnzY6l_3KPxuYkL2lH8A5eYY" class="nav-link">Tải Mega</a>
        <a href="#" class="nav-link">Zalo/Discord</a>
        <a href="#" class="nav-link">Fanpage</a>
    </div>

    <div class="center-menu">
        <a href="thongtin.html" class="main-btn">Thông tin Server</a>
        <a href="lotrinh.html" class="main-btn">Lộ trình</a>
        <a href="huongdan.html" class="main-btn">Hướng dẫn</a>
    </div>

</body>
</html>
